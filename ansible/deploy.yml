- name: Deploy Docker Container
  hosts: localhost
  become: true
  gather_facts: false

  tasks:
    - name: Remove old container if exists
      docker_container:
        name: my-app
        state: absent
      ignore_errors: true

    - name: Remove old image if exists
      docker_image:
        name: my-app
        state: absent
        force_absent: true
      ignore_errors: true

    - name: Build Docker image
      docker_image:
        name: my-app
        build:
          path: ..
          dockerfile: Dockerfile
        source: build

    - name: Run container
      docker_container:
        name: my-app
        image: my-app
        state: started
        restart_policy: always
        ports:
          - "80:80"